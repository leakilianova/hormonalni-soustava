<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hormonální Trenažér SŠ</title>
  
  <!-- Načtení Reactu a ReactDOM z CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Načtení Babelu pro kompilaci JSX v prohlížeči -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Načtení Tailwind CSS pro stylování -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Načtení Lucide ikon přes CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    /* Vlastní doplňující styly pro plynulé animace a font */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0f172a;
    }
    
    .font-mono {
      font-family: 'JetBrains+Mono', monospace;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.97); }
      to { opacity: 1; transform: scale(1); }
    }

    .animate-fadeIn {
      animation: fadeIn 0.3s ease-out forwards;
    }

    .animate-scaleIn {
      animation: scaleIn 0.25s ease-out forwards;
    }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col">

  <!-- Hlavní kontejner pro React aplikaci -->
  <div id="root" class="flex flex-col flex-grow"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // React komponenta pro vykreslení Lucide ikon v čistém HTML prostředí
    const Icon = ({ name, className = "w-6 h-6" }) => {
      useEffect(() => {
        // Inicializace nově vykreslených ikon v DOM
        if (window.lucide) {
          window.lucide.createIcons();
        }
      }, [name]);
      
      return <i data-lucide={name} class={className}></i>;
    };

    // Web Audio API pomocník pro zvukové efekty
    const playSound = (type) => {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        
        if (type === 'success') {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(440, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.15);
          gain.gain.setValueAtTime(0.1, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
          osc.start();
          osc.stop(ctx.currentTime + 0.2);
        } else if (type === 'error') {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(220, ctx.currentTime);
          osc.frequency.linearRampToValueAtTime(110, ctx.currentTime + 0.2);
          gain.gain.setValueAtTime(0.15, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.25);
          osc.start();
          osc.stop(ctx.currentTime + 0.25);
        } else if (type === 'click') {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(600, ctx.currentTime);
          gain.gain.setValueAtTime(0.05, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
          osc.start();
          osc.stop(ctx.currentTime + 0.05);
        } else if (type === 'victory') {
          const notes = [261.63, 329.63, 392.00, 523.25];
          notes.forEach((freq, index) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.setValueAtTime(freq, ctx.currentTime + index * 0.1);
            gain.gain.setValueAtTime(0.1, ctx.currentTime + index * 0.1);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + index * 0.1 + 0.2);
            osc.start(ctx.currentTime + index * 0.1);
            osc.stop(ctx.currentTime + index * 0.1 + 0.2);
          });
        }
      } catch (e) {
        // nepodporováno nebo blokováno prohlížečem
      }
    };

    // Pomocná funkce pro promíchání pole (Fisher-Yates)
    const shuffleArray = (array) => {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    };

    function App() {
      const [screen, setScreen] = useState('intro'); // intro, game, result
      const [activeTab, setActiveTab] = useState(0); // 0: Anatomy, 1: Matching, 2: Venn, 3: Cases
      const [score, setScore] = useState(0);
      const [timeLeft, setTimeLeft] = useState(300); // 5 minut v sekundách
      const [timerRunning, setTimerRunning] = useState(false);
      
      // 1. Úkol: Anatomie - stavy (promíchané hledání, prázdné body bez pohybu)
      const [shuffledAnatomyOrder, setShuffledAnatomyOrder] = useState([]); 
      const [currentAnatomyIndex, setCurrentAnatomyIndex] = useState(0); 
      const [anatomyAnswers, setAnatomyAnswers] = useState({}); // {glandId: true/false}
      
      // 2. Úkol: Spojování (3-fázové spojení)
      const [shuffledHormones, setShuffledHormones] = useState([]);
      const [shuffledGlands, setShuffledGlands] = useState([]);
      const [shuffledFunctions, setShuffledFunctions] = useState([]);
      
      const [selectedHormone, setSelectedHormone] = useState(null); 
      const [selectedGland, setSelectedGland] = useState(null); 
      const [selectedFunction, setSelectedFunction] = useState(null); 
      const [matchedHormones, setMatchedHormones] = useState([]); // spárované hormony

      // 3. Úkol: Třídění (promíchané výroky)
      const [shuffledVennItems, setShuffledVennItems] = useState([]);
      const [vennAnswers, setVennAnswers] = useState({}); // {itemId: 'N' | 'E' | 'B'}
      
      // 4. Úkol: Klinické diagnózy
      const [cases] = useState([
        {
          id: 1,
          title: "Případ č. 1: Extrémní žízeň",
          desc: "Patnáctiletý student pociťuje neustálou žízeň, často chodí močit a cítí se unavený. Lékař mu naměřil vysokou hladinu glukózy v krvi.",
          question: "Který hormon tělu chybí nebo na něj buňky nereagují?",
          options: ["Glukagon", "Inzulin", "Adrenalin", "Kortisol"],
          correct: "Inzulin",
          feedback: "Správně! Nedostatek inzulinu (nebo rezistence na něj) způsobuje diabetes mellitus (cukrovku), kdy buňky nedokážou přijímat glukózu z krve."
        },
        {
          id: 2,
          title: "Případ č. 2: Útěk před psem",
          desc: "Při cestě ze školy na tebe náhle vyštěkl velký pes. Okamžitě se ti rozbušilo srdce, zrychlil dech a tvé svaly se napjaly k rychlému úniku.",
          question: "Který hormon způsobil tuto bleskovou stresovou reakci?",
          options: ["Tyroxin", "Oxytocin", "Adrenalin", "Kortisol"],
          correct: "Adrenalin",
          feedback: "Přesně tak! Adrenalin z dřeně nadledvin připravuje tělo na reakci 'bojuj, nebo uteč' (zvýšení tepu, tlaku, uvolnění energie)."
        },
        {
          id: 3,
          title: "Případ č. 3: Trvalý stres ze zkoušek",
          desc: "Studentka SŠ se již měsíc intenzivně stresuje kvůli maturitním zkouškám. Špatně spí, je náchylná k nemocem a pociťuje dlouhodobé vyčehrání.",
          question: "Který hormon je zodpovědný za adaptaci na dlouhodobý stres?",
          options: ["Kortisol", "Inzulin", "Růstový hormon", "ADH"],
          correct: "Kortisol",
          feedback: "Správně! Kortisol se tvoří v kůře nadledvin a pomáhá tělu zvládat dlouhodobou zátěž, ale dlouhodobě tlumí imunitní systém."
        },
        {
          id: 4,
          title: "Případ č. 4: Problém se zimomřivostí",
          desc: "Pacientka si stěžuje na neustálou únavu, zimomřivost, přibývání na váze a zpomalené reflexy. Lékař diagnostikoval sníženou rychlost metabolismu.",
          question: "Která žláza pravděpodobně produkuje nedostatečné množství hormonů?",
          options: ["Slinivka břišní", "Brzlík", "Štítná žláza", "Hypofýza"],
          correct: "Štítná žláza",
          feedback: "Správně! Hormony štítné žlázy (tyroxin T4 a trijodtyronin T3) přímo kontrolují rychlost metabolismu v buňkách."
        },
        {
          id: 5,
          title: "Případ č. 5: Zpětná vazba v akci",
          desc: "V těle došlo k poklesu hormonů štítné žlázy. Hypothalamus to zaregistruje a vyšle signál do hypofýzy.",
          question: "Jak hypofýza zareaguje, aby stimulovala štítnou žlázu k vyšší tvorbě?",
          options: [
            "Vyloučí více tyreotropinu (TSH)",
            "Zastaví vylučování oxytocinu",
            "Začne vylučovat inzulin",
            "Utlumí veškerou činnost"
          ],
          correct: "Vyloučí více tyreotropinu (TSH)",
          feedback: "Perfektní! Jedná se o klasický princip negativní zpětné vazby. Vyšší hladina TSH přiměje štítnou žlázu tvořit více tyroxinu."
        }
      ]);
      const [currentCaseIndex, setCurrentCaseIndex] = useState(0);
      const [selectedCaseOption, setSelectedCaseOption] = useState(null);
      const [caseAnswered, setCaseAnswered] = useState(false);
      const [caseCorrect, setCaseCorrect] = useState(null);

      // Anatomické žlázy a jejich poloha
      const glands = [
        { id: 1, name: "Hypothalamus", desc: "Řídí hypofýzu, spojuje nervovou a hormonální soustavu.", cx: 150, cy: 60 },
        { id: 2, name: "Hypofýza", desc: "Podvěsek mozkový, 'řídící žláza žláz', tvoří např. růstový hormon či TSH.", cx: 162, cy: 75 },
        { id: 3, name: "Štítná žláza", desc: "Produkuje tyroxin, určuje rychlost metabolismu.", cx: 150, cy: 115 },
        { id: 4, name: "Brzlík", desc: "Důležitý v dětství pro dozrávání bílých krvinek (imunita).", cx: 150, cy: 165 },
        { id: 5, name: "Nadledviny", desc: "Kůra produkuje kortisol (dlouhodobý stres), dřeň adrenalin (náhlý stres).", cx: 120, cy: 235 },
        { id: 6, name: "Slinivka břišní", desc: "Obsahuje Langerhansovy ostrůvky, produkuje inzulin a glukagon.", cx: 150, cy: 250 },
        { id: 7, name: "Vaječníky (ženy)", desc: "Produkují estrogeny a progesteron, ovlivňují cyklus a těhotenství.", cx: 135, cy: 310 },
        { id: 8, name: "Varlata (muži)", desc: "Produkují testosteron, ovlivňují sekundární pohlavní znaky.", cx: 155, cy: 375 }
      ];

      // Seznam hormonů pro spojovací hru
      const hormonesList = [
        { id: "h1", name: "Inzulin", source: "Slinivka břišní", func: "Udržuje / snižuje hladinu cukru v krvi" },
        { id: "h2", name: "Glukagon", source: "Slinivka břišní", func: "Zvyšuje hladinu cukru v krvi při hladu" },
        { id: "h3", name: "Adrenalin", source: "Nadledviny", func: "Rychlá reakce na stres (boj/útěk)" },
        { id: "h4", name: "Kortisol", source: "Nadledviny", func: "Adaptace na dlouhodobou zátěž/stres" },
        { id: "h5", name: "Tyroxin (T4)", source: "Štítná žláza", func: "Řízení rychlosti metabolismu v těle" },
        { id: "h6", name: "Růstový hormon (ST)", source: "Hypofýza", func: "Stimuluje růst těla a dělení buněk" },
        { id: "h7", name: "Oxytocin", source: "Hypothalamus", func: "Stahy dělohy při porodu a tvorba mateřských pout" },
        { id: "h8", name: "Antidiuretický hormon", source: "Hypothalamus", func: "Zpětné vstřebávání vody v ledvinách" }
      ];

      // Tvrzení k porovnání soustav
      const originalVennItems = [
        { id: 1, text: "Řízení pomocí elektrických impulsů a neurotransmiterů", cat: "N" },
        { id: 2, text: "Signál se šíří velmi rychle (v milisekundách)", cat: "N" },
        { id: 3, text: "Působí cíleně na konkrétní sval či buňku", cat: "N" },
        { id: 4, text: "Regulační látky (poslové) jsou přenášeny krví", cat: "E" },
        { id: 5, text: "Účinky nastupují pomaleji, ale jsou dlouhodobé", cat: "E" },
        { id: 6, text: "Látky působí i ve velmi malém množství", cat: "E" },
        { id: 7, text: "Udržuje vnitřní rovnováhu těla (homeostázu)", cat: "B" },
        { id: 8, text: "Spolupracuje na celkovém řízení organismu", cat: "B" }
      ];

      // Odpočet času
      useEffect(() => {
        let interval = null;
        if (timerRunning && timeLeft > 0) {
          interval = setInterval(() => {
            setTimeLeft((prev) => prev - 1);
          }, 1000);
        } else if (timeLeft === 0) {
          setScreen('result');
          setTimerRunning(false);
          playSound('error');
        }
        return () => clearInterval(interval);
      }, [timerRunning, timeLeft]);

      // Spuštění a restartování hry se zamícháním prvků
      const startGame = () => {
        playSound('click');
        setScore(0);
        setTimeLeft(300);
        setAnatomyAnswers({});
        
        // 1. Zamíchání anatomického pořadí hledaných žláz
        const shuffledAnatomy = shuffleArray(glands.map(g => g.id));
        setShuffledAnatomyOrder(shuffledAnatomy);
        setCurrentAnatomyIndex(0);

        // 2. Nezávislé zamíchání prvků v laboratoři (Hormony a Funkce)
        setShuffledHormones(shuffleArray(hormonesList));
        setShuffledGlands(shuffleArray([
          "Slinivka břišní", 
          "Nadledviny", 
          "Štítná žláza", 
          "Hypofýza", 
          "Hypothalamus"
        ]));
        setShuffledFunctions(shuffleArray(hormonesList.map(h => h.func)));
        
        setMatchedHormones([]);
        setSelectedHormone(null);
        setSelectedGland(null);
        setSelectedFunction(null);

        // 3. Zamíchání výroků ve Vennově diagramu
        setShuffledVennItems(shuffleArray(originalVennItems));
        setVennAnswers({});

        // 4. Reset lékařských případů
        setCurrentCaseIndex(0);
        setSelectedCaseOption(null);
        setCaseAnswered(false);
        setCaseCorrect(null);

        setScreen('game');
        setActiveTab(0);
        setTimerRunning(true);
      };

      // Anatomický výběr (kliknutí na postavu)
      const handleAnatomyClick = (glandId) => {
        if (currentAnatomyIndex >= shuffledAnatomyOrder.length) return;
        
        const targetGlandId = shuffledAnatomyOrder[currentAnatomyIndex];
        if (anatomyAnswers[targetGlandId] !== undefined) return; // již zodpovězeno
        
        const isCorrect = glandId === targetGlandId;
        if (isCorrect) {
          playSound('success');
          setScore(prev => prev + 15);
          setAnatomyAnswers(prev => ({ ...prev, [targetGlandId]: true }));
        } else {
          playSound('error');
          setAnatomyAnswers(prev => ({ ...prev, [targetGlandId]: false }));
        }
        
        setCurrentAnatomyIndex(prev => prev + 1);
      };

      // Výběry u třífázového spojování
      const handleHormoneSelect = (hormone) => {
        playSound('click');
        if (selectedHormone?.id === hormone.id) {
          setSelectedHormone(null);
        } else {
          setSelectedHormone(hormone);
          checkAndExecuteThreeWayMatch(hormone, selectedGland, selectedFunction);
        }
      };

      const handleGlandSelect = (glandName) => {
        playSound('click');
        if (selectedGland === glandName) {
          setSelectedGland(null);
        } else {
          setSelectedGland(glandName);
          checkAndExecuteThreeWayMatch(selectedHormone, glandName, selectedFunction);
        }
      };

      const handleFunctionSelect = (funcText) => {
        playSound('click');
        if (selectedFunction === funcText) {
          setSelectedFunction(null);
        } else {
          setSelectedFunction(funcText);
          checkAndExecuteThreeWayMatch(selectedHormone, selectedGland, funcText);
        }
      };

      // Kontrola správného třífázového spárování
      const checkAndExecuteThreeWayMatch = (hormone, gland, func) => {
        if (hormone && gland && func) {
          const isCorrect = (hormone.source === gland) && (hormone.func === func);

          if (isCorrect) {
            playSound('success');
            setScore(prev => prev + 20); 
            setMatchedHormones(prev => [...prev, hormone.name]);
          } else {
            playSound('error');
          }
          setSelectedHormone(null);
          setSelectedGland(null);
          setSelectedFunction(null);
        }
      };

      // Zatřídění tvrzení (Venn)
      const handleVennSort = (itemId, category) => {
        playSound('click');
        const item = shuffledVennItems.find(i => i.id === itemId);
        const isCorrect = item.cat === category;
        
        if (isCorrect) {
          playSound('success');
          setScore(prev => prev + 15);
        } else {
          playSound('error');
        }
        setVennAnswers(prev => ({ ...prev, [itemId]: category }));
      };

      // Výběr možnosti v lékařském případu
      const handleCaseOptionSelect = (option) => {
        if (caseAnswered) return;
        playSound('click');
        setSelectedCaseOption(option);
        setCaseAnswered(true);
        const isCorrect = option === cases[currentCaseIndex].correct;
        setCaseCorrect(isCorrect);
        if (isCorrect) {
          playSound('success');
          setScore(prev => prev + 25);
        } else {
          playSound('error');
        }
      };

      const handleNextCase = () => {
        playSound('click');
        if (currentCaseIndex < cases.length - 1) {
          setCurrentCaseIndex(prev => prev + 1);
          setSelectedCaseOption(null);
          setCaseAnswered(false);
          setCaseCorrect(null);
        } else {
          playSound('victory');
          setScreen('result');
          setTimerRunning(false);
        }
      };

      const formatTime = (seconds) => {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
      };

      // Realistické, vědecké zhodnocení výkonu na základě finálního skóre
      const getRank = (finalScore) => {
        if (finalScore >= 450) return { title: "Profesor Endokrinologie 🎓", desc: "Vynikající úroveň. Prokázaná schopnost komplexně integrovat znalosti o endokrinní regulaci a klinických souvislostech." };
        if (finalScore >= 320) return { title: "Garant Klinického Výzkumu 🔬", desc: "Velmi dobrá úroveň. Solidní znalost anatomie a fyziologických funkcí s drobnými nedostatky v detailech nebo klinické diagnostice." };
        if (finalScore >= 180) return { title: "Mladší Vědecký Asistent 🧪", desc: "Standardní úroveň. Základní biologické principy jsou pochopeny, doporučujeme hlubší zaměření na vztahy mezi žlázami a cílovými tkáněmi." };
        return { title: "Laický Pozorovatel 🫁", desc: "Rozvojová úroveň. Pro dosažení požadovaných výstupů doporučujeme znovu prostudovat materiály k zpětné vazbě a funkce jednotlivých hormonů." };
      };

      const isFunctionMatched = (funcText) => {
        return hormonesList.some(h => h.func === funcText && matchedHormones.includes(h.name));
      };

      const currentAnatomyTargetId = shuffledAnatomyOrder[currentAnatomyIndex];
      const currentAnatomyTargetGland = glands.find(g => g.id === currentAnatomyTargetId);

      return (
        <div className="min-h-screen bg-slate-900 text-slate-100 flex flex-col font-sans select-none selection:bg-teal-500 selection:text-white flex-grow">
          
          {/* HLAVNÍ NAVIGAČNÍ PANEL */}
          <header className="bg-slate-800 border-b border-slate-700 px-6 py-4 flex flex-wrap items-center justify-between shadow-lg sticky top-0 z-50">
            <div className="flex items-center space-x-3">
              <div className="bg-teal-500 text-slate-900 p-2 rounded-xl shadow-inner animate-pulse">
                <Icon name="dna" className="w-6 h-6" />
              </div>
              <div>
                <h1 className="text-xl font-bold tracking-tight text-white flex items-center gap-1.5">
                  Hormonální Trenažér <span className="text-xs bg-teal-500/20 text-teal-300 font-semibold px-2 py-0.5 rounded-full border border-teal-500/30">2. Ročník</span>
                </h1>
                <p className="text-xs text-slate-400">Interaktivní 5-minutové procvičování humoralní soustavy</p>
              </div>
            </div>

            {screen === 'game' && (
              <div className="flex items-center space-x-6 mt-3 sm:mt-0">
                <div className="flex items-center space-x-2 bg-slate-900/60 px-4 py-2 rounded-full border border-slate-700">
                  <Icon name="clock" className="w-5 h-5 text-amber-400" />
                  <span className={`font-mono text-lg font-bold ${timeLeft < 60 ? 'text-rose-400 animate-pulse' : 'text-slate-200'}`}>
                    {formatTime(timeLeft)}
                  </span>
                </div>

                <div className="flex items-center space-x-2 bg-slate-900/60 px-4 py-2 rounded-full border border-slate-700">
                  <Icon name="flame" className="w-5 h-5 text-teal-400" />
                  <span className="text-lg font-mono font-bold text-teal-300">{score} b.</span>
                </div>

                <button 
                  onClick={() => { if (confirm('Opravdu chcete restartovat hru?')) startGame(); }}
                  className="text-slate-400 hover:text-white transition-colors p-2"
                  title="Restartovat"
                >
                  <Icon name="refresh-cw" className="w-5 h-5" />
                </button>
              </div>
            )}
          </header>

                              <div className="bg-purple-500/5 border border-purple-500/30 rounded-2xl p-4 min-h-[140px]">
                                <h5 className="font-black text-purple-400 text-xs uppercase tracking-wider mb-2 border-b border-purple-500/20 pb-1 flex items-center justify-between">
                                  <span>Společné rysy</span>
                                  <span className="bg-purple-500 text-slate-950 font-bold px-1.5 py-0.2 rounded-full text-[10px]">A + B</span>
                                </h5>
                                <ul className="space-y-1.5">
                                  {shuffledVennItems.filter(i => vennAnswers[i.id] === 'B').map(i => (
                                    <li key={i.id} className={`text-xs p-1.5 rounded border leading-snug ${i.cat === 'B' ? 'bg-emerald-500/15 border-emerald-500/20 text-slate-300' : 'bg-rose-500/15 border-rose-500/20 text-rose-300'}`}>
                                      • {i.text}
                                    </li>
                                  ))}
                                </ul>
                              </div>

                              {/* Box Hormonální soustava */}
                              <div className="bg-amber-500/5 border border-amber-500/30 rounded-2xl p-4 min-h-[140px]">
                                <h5 className="font-black text-amber-400 text-xs uppercase tracking-wider mb-2 border-b border-amber-500/20 pb-1 flex items-center justify-between">
                                  <span>Hormonální s.</span>
                                  <span className="bg-amber-500 text-slate-950 font-bold px-1.5 py-0.2 rounded-full text-[10px]">B</span>
                                </h5>
                                <ul className="space-y-1.5">
                                  {shuffledVennItems.filter(i => vennAnswers[i.id] === 'E').map(i => (
                                    <li key={i.id} className={`text-xs p-1.5 rounded border leading-snug ${i.cat === 'E' ? 'bg-emerald-500/15 border-emerald-500/20 text-slate-300' : 'bg-rose-500/15 border-rose-500/20 text-rose-300'}`}>
                                      • {i.text}
                                    </li>
                                  ))}
                                </ul>
                              </div>
                            </div>
                          </div>

                          {Object.keys(vennAnswers).length === originalVennItems.length && (
                            <div className="mt-6 pt-4 border-t border-slate-800 text-center">
                              <button 
                                onClick={() => { playSound('click'); setActiveTab(3); }} 
                                className="bg-purple-500 hover:bg-purple-400 text-slate-950 font-black px-8 py-3 rounded-xl text-sm transition-colors shadow-lg"
                              >
                                Pokračovat k Diagnózám lékaře
                              </button>
                            </div>
                          )}
                        </div>
                      </div>
                    </div>
                  )}

                  {/* TAB 3: DIAGNOSTIKA KLINICKÝCH PŘÍPADŮ */}
                  {activeTab === 3 && (
                    <div className="max-w-2xl mx-auto">
                      <div className="mb-6 bg-slate-900/60 p-4 rounded-xl border border-slate-700 text-center animate-fadeIn">
                        <h3 className="text-teal-400 font-extrabold text-xs uppercase tracking-widest mb-1">Úkol 4/4</h3>
                        <h4 className="text-xl font-black text-white">Lékařská diagnostika</h4>
                        <p className="text-sm text-slate-300 mt-1">
                          Vyřeš 5 klinických případů z praxe. Přečti si symptomy pacienta a urči správnou hormonální příčinu.
                        </p>
                      </div>

                      {/* Karta klinického případu */}
                      <div className="bg-slate-900 rounded-3xl p-6 border border-slate-700 relative overflow-hidden">
                        <div className="absolute top-0 right-0 px-4 py-1.5 bg-teal-500/15 text-teal-400 text-xs font-bold rounded-bl-xl border-l border-b border-slate-700">
                          Případ {currentCaseIndex + 1} z {cases.length}
                        </div>

                        <h4 className="text-lg font-bold text-white mb-2">{cases[currentCaseIndex].title}</h4>
                        <p className="text-slate-300 text-sm leading-relaxed mb-6 bg-slate-950/50 p-4 rounded-xl border border-slate-800 italic">
                          " {cases[currentCaseIndex].desc} "
                        </p>

                        <p className="text-sm font-bold text-slate-100 mb-3">{cases[currentCaseIndex].question}</p>
                        
                        <div className="grid sm:grid-cols-2 gap-3 mb-6">
                          {cases[currentCaseIndex].options.map((opt, idx) => {
                            const isSelected = selectedCaseOption === opt;
                            const isCorrectAnswer = opt === cases[currentCaseIndex].correct;
                            
                            let btnStyle = "bg-slate-800/80 border-slate-700 hover:bg-slate-800 hover:border-slate-600 text-slate-200";
                            if (caseAnswered) {
                              if (isCorrectAnswer) {
                                btnStyle = "bg-emerald-500/20 border-emerald-500 text-emerald-300";
                              } else if (isSelected) {
                                btnStyle = "bg-rose-500/20 border-rose-500 text-rose-300";
                              } else {
                                btnStyle = "bg-slate-900/50 border-slate-800 text-slate-600 cursor-not-allowed";
                              }
                            }

                            return (
                              <button
                                key={idx}
                                disabled={caseAnswered}
                                onClick={() => handleCaseOptionSelect(opt)}
                                className={`p-3 rounded-xl border text-sm font-semibold transition-all text-left flex items-center justify-between ${btnStyle}`}
                              >
                                <span>{opt}</span>
                                {caseAnswered && isCorrectAnswer && <Icon name="check-circle" className="w-4 h-4 text-emerald-400" />}
                                {caseAnswered && isSelected && !isCorrectAnswer && <Icon name="x-circle" className="w-4 h-4 text-rose-400" />}
                              </button>
                            );
                          })}
                        </div>

                        {/* Zpětná vazba pro studenty */}
                        {caseAnswered && (
                          <div className="p-4 rounded-xl bg-slate-950 border border-slate-800 animate-fadeIn">
                            <div className="flex items-start gap-2.5">
                              {caseCorrect ? (
                                <Icon name="check-circle" className="w-5 h-5 text-emerald-400 mt-0.5 flex-shrink-0" />
                              ) : (
                                <Icon name="shield-alert" className="w-5 h-5 text-rose-400 mt-0.5 flex-shrink-0" />
                              )}
                              <div>
                                <p className={`font-bold text-sm ${caseCorrect ? 'text-emerald-400' : 'text-rose-400'}`}>
                                  {caseCorrect ? 'Vynikající diagnóza!' : 'Diagnóza nebyla správná.'}
                                </p>
                                <p className="text-xs text-slate-300 mt-1 leading-relaxed">
                                  {cases[currentCaseIndex].feedback}
                                </p>
                              </div>
                            </div>
                            
                            <div className="mt-4 flex justify-end">
                              <button
                                onClick={handleNextCase}
                                className="inline-flex items-center gap-1.5 bg-teal-500 hover:bg-teal-400 text-slate-950 font-bold px-5 py-2 rounded-lg text-xs transition-colors"
                              >
                                <span>
                                  {currentCaseIndex < cases.length - 1 ? 'Další diagnóza' : 'Ukončit a vyhodnotit trenažér'}
                                </span>
                                <Icon name="arrow-right" className="w-3.5 h-3.5" />
                              </button>
                            </div>
                          </div>
                        )}
                      </div>
                    </div>
                  )}

                </div>
              </div>
            )}

            {/* 3. ZÁVĚREČNÉ VYHODNOCENÍ */}
            {screen === 'result' && (
              <div className="max-w-2xl mx-auto w-full bg-slate-800 rounded-3xl border border-slate-700 p-8 shadow-2xl relative overflow-hidden my-6 text-center animate-scaleIn">
                <div className="absolute top-0 right-0 w-64 h-64 bg-teal-500/10 rounded-full blur-3xl -z-10" />
                <div className="absolute -bottom-10 -left-10 w-48 h-48 bg-indigo-500/10 rounded-full blur-2xl -z-10" />

                <div className="inline-flex p-4 bg-teal-500/10 text-teal-400 rounded-full border border-teal-500/20 mb-4 shadow-inner">
                  <Icon name="award" className="w-12 h-12" />
                </div>

                <h2 className="text-3xl font-black text-white">Trenažér dokončen!</h2>
                <p className="text-slate-400 text-sm mt-1">Děkujeme za vyřešení biologické výzvy.</p>

                <div className="my-8 py-6 bg-slate-900/60 rounded-3xl border border-slate-700/60 max-w-md mx-auto">
                  <p className="text-xs font-bold text-slate-400 uppercase tracking-widest">Tvé celkové skóre</p>
                  <p className="text-6xl font-black text-teal-400 mt-2 font-mono">{score} <span className="text-2xl font-normal text-slate-500">b.</span></p>
                  
                  <div className="grid grid-cols-2 gap-4 mt-6 pt-6 border-t border-slate-800 text-left px-6">
                    <div>
                      <p className="text-[10px] uppercase font-bold text-slate-400">Zbývající čas:</p>
                      <p className="text-sm font-bold text-slate-200 mt-0.5">{formatTime(timeLeft)}</p>
                    </div>
                    <div>
                      <p className="text-[10px] uppercase font-bold text-slate-400">Překonáno úkolů:</p>
                      <p className="text-sm font-bold text-slate-200 mt-0.5">4 ze 4 sekcí</p>
                    </div>
                  </div>
                </div>

                {/* Realistické akademické hodnocení */}
                <div className="bg-slate-900 p-6 rounded-2xl border border-slate-700/80 mb-8 max-w-lg mx-auto text-left">
                  <p className="text-xs font-bold text-teal-400 uppercase tracking-wider mb-1">Dosažený vědecký titul:</p>
                  <h4 className="text-xl font-extrabold text-white">{getRank(score).title}</h4>
                  <p className="text-sm text-slate-300 mt-2 leading-relaxed">
                    {getRank(score).desc}
                  </p>
                </div>

                <div className="flex flex-col sm:flex-row gap-3 justify-center">
                  <button
                    onClick={startGame}
                    className="inline-flex items-center justify-center gap-2 bg-teal-500 hover:bg-teal-400 text-slate-950 font-extrabold px-6 py-3.5 rounded-xl transition-all"
                  >
                    <Icon name="refresh-cw" className="w-4 h-4" />
                    <span>Zkusit trenažér znovu</span>
                  </button>
                  
                  <a
                    href="https://www.nzip.cz/clanek/2306-hormony-zakladni-informace"
                    target="_blank"
                    rel="noopener noreferrer"
                    className="inline-flex items-center justify-center gap-2 bg-slate-700 hover:bg-slate-600 text-slate-200 font-bold px-6 py-3.5 rounded-xl transition-all border border-slate-600"
                  >
                    <Icon name="help-circle" className="w-4 h-4" />
                    <span>Otevřít portál NZIP</span>
                  </a>
                </div>
              </div>
            )}

          </main>

          {/* ZÁPATÍ */}
          <footer className="bg-slate-950 py-4 px-6 text-center text-xs text-slate-500 border-t border-slate-900">
            <p>© 2026 Hormonální Soustava Game | Určeno pro výuku biologie SŠ</p>
          </footer>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
